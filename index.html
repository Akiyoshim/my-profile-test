<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akiyoshi's Profile</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* カスタムグラデーションとフォントの微調整 */
        .hero-bg {
            background: linear-gradient(135deg, #1f4037, #99f2c8);
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen flex flex-col">

    <!-- ヘッダー・メインビジュアル -->
    <header class="hero-bg text-white text-center py-24 px-6 shadow-md">
        <h1 class="text-5xl font-extrabold tracking-wider mb-4 animate-fade-in">Akiyoshi</h1>
        <p class="text-xl md:text-2xl italic opacity-90 font-light">Always Learning, Always Exploring</p>
    </header>

    <!-- メインコンテンツ -->
    <main class="flex-grow container mx-auto max-w-4xl px-4 py-12">
        
        <!-- 好きなものセクション -->
        <section id="about" class="mb-16">
            <h2 class="text-3xl font-bold text-center text-[#1f4037] mb-2">Favorite Things</h2>
            <div class="w-16 h-1 bg-[#1f4037] mx-auto mb-10 rounded-full"></div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- 1つ目: Learning -->
                <div class="bg-white p-6 rounded-xl shadow-sm hover:shadow-md border border-gray-100 transition-all duration-300 transform hover:-translate-y-1">
                    <div class="border-l-4 border-[#1f4037] pl-3 mb-3">
                        <h3 class="text-xl font-bold text-[#1f4037]">Learning</h3>
                    </div>
                    <p class="text-gray-600 text-sm leading-relaxed">
                        新しいことを学び、生活や仕事に活かすこと。
                    </p>
                </div>

                <!-- 2つ目: Football -->
                <div class="bg-white p-6 rounded-xl shadow-sm hover:shadow-md border border-gray-100 transition-all duration-300 transform hover:-translate-y-1">
                    <div class="border-l-4 border-[#1f4037] pl-3 mb-3">
                        <h3 class="text-xl font-bold text-[#1f4037]">Football</h3>
                    </div>
                    <p class="text-gray-600 text-sm leading-relaxed">
                        プレー・観戦・チーム運営まで楽しんでいます。特に川崎フロンターレを応援しています。
                    </p>
                </div>

                <!-- 3つ目: Forest -->
                <div class="bg-white p-6 rounded-xl shadow-sm hover:shadow-md border border-gray-100 transition-all duration-300 transform hover:-translate-y-1">
                    <div class="border-l-4 border-[#1f4037] pl-3 mb-3">
                        <h3 class="text-xl font-bold text-[#1f4037]">Forest</h3>
                    </div>
                    <p class="text-gray-600 text-sm leading-relaxed">
                        森が好きです。
                    </p>
                </div>
            </div>
        </section>

        <!-- お問い合わせフォームセクション -->
        <section id="contact" class="max-w-xl mx-auto">
            <h2 class="text-3xl font-bold text-center text-[#1f4037] mb-2">Contact</h2>
            <div class="w-16 h-1 bg-[#1f4037] mx-auto mb-10 rounded-full"></div>
            
            <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-100">
                <form id="profile-contact-form" class="space-y-6">
                    <div>
                        <label for="name" class="block text-sm font-semibold text-gray-700 mb-2">お名前</label>
                        <input type="text" id="name" name="name" placeholder="山田 太郎" required
                            class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-[#1f4037] focus:border-transparent outline-none transition">
                    </div>
                    <div>
                        <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">メールアドレス</label>
                        <input type="email" id="email" name="email" placeholder="example@email.com" required
                            class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-[#1f4037] focus:border-transparent outline-none transition">
                    </div>
                    <div>
                        <label for="message" class="block text-sm font-semibold text-gray-700 mb-2">メッセージ</label>
                        <textarea id="message" name="message" placeholder="メッセージを入力してください" required rows="4"
                            class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-[#1f4037] focus:border-transparent outline-none transition resize-none"></textarea>
                    </div>
                    <button type="submit" id="submit-btn"
                        class="w-full py-3 bg-[#1f4037] hover:bg-[#152e27] text-white font-bold rounded-lg shadow-md hover:shadow-lg transition duration-300">
                        送信する
                    </button>
                </form>
                
                <!-- 送信ステータス表示 -->
                <div id="form-message" class="mt-4 p-4 rounded-lg text-center hidden"></div>
            </div>
        </section>

    </main>

    <!-- フッター -->
    <footer class="bg-[#1f4037] text-white text-center py-6 text-sm mt-auto">
        <p>&copy; 2026 Akiyoshi. All rights reserved.</p>
    </footer>

    <!-- 送信制御スクリプト -->
    <script>
        const form = document.getElementById('profile-contact-form');
        const submitBtn = document.getElementById('submit-btn');
        const messageBox = document.getElementById('form-message');
        
        // GASのウェブアプリURL
        const gasUrl = "https://script.google.com/macros/s/AKfycbxdBZ5SELYTDpTwFi-wWDPF-OcX7IiP7f1YWPeHy8ilS-YwyRxdWcUp9hbnwCSgjeHh/exec";

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // 送信状態への切り替え
            submitBtn.disabled = true;
            submitBtn.innerText = "送信中...";
            messageBox.classList.add('hidden');
            messageBox.className = "mt-4 p-4 rounded-lg text-center hidden";

            const formData = new FormData(form);
            
            fetch(gasUrl, {
                method: 'POST',
                body: formData
            })
            .then(response => {
                // 送信成功
                messageBox.classList.remove('hidden');
                messageBox.classList.add('bg-green-100', 'text-green-800');
                messageBox.innerText = "メッセージが正常に送信されました！";
                form.reset();
            })
            .catch(error => {
                // 送信エラー
                console.error('Error:', error);
                messageBox.classList.remove('hidden');
                messageBox.classList.add('bg-red-100', 'text-red-800');
                messageBox.innerText = "送信に失敗しました。時間をおいて再度お試しください。";
            })
            .finally(() => {
                submitBtn.disabled = false;
                submitBtn.innerText = "送信する";
            });
        });
    </script>
</body>
</html>
